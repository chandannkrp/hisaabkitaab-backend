
networks:
  hisaab-net:
    external: true

services: 
  app: 
    container_name : hisaabkitaab-server
    build: .
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    restart:
      always
    volumes: 
      - ./logs:/app/logs
    networks:
      - hisaab-net
    

  
    